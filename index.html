<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Renascer — Juliana</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* 🔴 NOVO (não interfere no seu design) */
.top-banner{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
background:linear-gradient(90deg,#ff3b3b,#c40000);
color:#fff;
text-align:center;
padding:8px;
font-size:.72rem;
letter-spacing:.08em;
font-weight:600;
}

.price-box{
margin-top:14px;
display:flex;
gap:8px;
align-items:center;
justify-content:center;
font-weight:700;
}

.old-price{
text-decoration:line-through;
color:#6a7e92;
font-size:.85rem;
opacity:.7;
}

.new-price{
color:#e8538a;
font-size:1.2rem;
}

.price-final .new-price{
font-size:1.5rem;
}

.alert-box{
margin:26px auto;
max-width:520px;
background:rgba(232,83,138,.06);
border:1px solid rgba(232,83,138,.18);
color:#4a5f7a;
padding:14px 18px;
border-radius:14px;
font-size:.85rem;
text-align:center;
}

.cta-urgency{
margin-top:14px;
font-size:.78rem;
color:rgba(255,255,255,.7);
}

@media(max-width:768px){
.btn-primary,
.btn-cta-final{
width:100%;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.18);
}
}
</style>

</head>

<body>

<!-- 🔴 BANNER -->
<div class="top-banner">
🔴 Preço de lançamento disponível por tempo limitado
</div>

<!-- ⚠️ SEU SITE ORIGINAL CONTINUA AQUI NORMAL -->

<script>
// ===== INSERÇÕES AUTOMÁTICAS =====

// HERO PREÇO
const hero = document.querySelector('.hero-content');
if(hero){
  const price = document.createElement('div');
  price.className = 'price-box';
  price.innerHTML = '<span class="old-price">de R$97,00</span><span class="new-price">por R$67,00</span>';
  hero.appendChild(price);
}

// ALERTA BÔNUS
const bonus = document.querySelector('.bonus-title-wrap');
if(bonus){
  const alert = document.createElement('div');
  alert.className = 'alert-box';
  alert.innerHTML = '⚠️ Os bônus podem sair do pacote quando o valor subir';
  bonus.appendChild(alert);
}

// PREÇO MEIO
const bonusSection = document.querySelector('.bonus-section .section-inner');
if(bonusSection){
  const priceMid = document.createElement('div');
  priceMid.className = 'price-box';
  priceMid.style.marginTop = '30px';
  priceMid.innerHTML = '<span class="old-price">de R$97,00</span><span class="new-price">por R$67,00</span>';
  bonusSection.appendChild(priceMid);
}

// PREÇO FINAL
const cta = document.querySelector('.cta-inner');
if(cta){
  const priceFinal = document.createElement('div');
  priceFinal.className = 'price-box price-final';
  priceFinal.innerHTML = '<span class="old-price">de R$97,00</span><span class="new-price">por R$67,00</span>';
  cta.appendChild(priceFinal);

  const urgency = document.createElement('p');
  urgency.className = 'cta-urgency';
  urgency.innerText = '⏳ Oferta disponível por tempo limitado';
  cta.appendChild(urgency);
}

// BOTÕES
document.querySelectorAll('.btn-primary').forEach(btn=>{
  btn.innerText = 'Quero o meu protocolo agora →';
});

const finalBtn = document.querySelector('.btn-cta-final');
if(finalBtn){
  finalBtn.innerText = 'Quero viver sem dor agora →';
}
</script>

</body>
</html>
